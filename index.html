        <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaunchPad — Student-First Internships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --teal: #0d7377;
      --mint: #14c7b8;
      --coral: #ff6b6b;
      --gold: #f4a628;
      --off-white: #f7f6f2;
      --warm-gray: #8a8a85;
      --light-border: #e8e6e0;
      --text: #1a1a18;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(247, 246, 242, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--light-border);
      opacity: 0;
      animation: fadeDown 0.6s 0.1s ease forwards;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--navy);
      letter-spacing: -0.02em;
    }

    .nav-logo .dot { color: var(--mint); }
    .nav-links { display: flex; gap: 2.5rem; align-items: center; }

    nav a {
      text-decoration: none;
      color: var(--warm-gray);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--teal); }

    .nav-cta {
      background: var(--teal) !important;
      color: white !important;
      padding: 0.55rem 1.4rem;
      border-radius: 2rem;
      font-size: 0.85rem !important;
      transition: background 0.2s, transform 0.2s !important;
    }

    .nav-cta:hover { background: var(--navy) !important; transform: translateY(-1px); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(13,115,119,0.12) 0%, transparent 65%),
        radial-gradient(circle 300px at 10% 80%, rgba(244,166,40,0.06) 0%, transparent 70%),
        radial-gradient(circle 200px at 90% 60%, rgba(255,107,107,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite;
    }

    .blob-1 { width: 400px; height: 400px; background: var(--teal); top: -100px; right: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--gold); bottom: 0; left: -80px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: var(--coral); top: 40%; right: 5%; animation-delay: 5s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: white;
      border: 1px solid var(--light-border);
      border-radius: 2rem;
      padding: 0.45rem 1.1rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--teal);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease forwards;
      position: relative;
      z-index: 1;
      box-shadow: 0 2px 12px rgba(13,115,119,0.1);
    }

    .hero-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--mint);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.5); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--navy);
      max-width: 820px;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.45s ease forwards;
      position: relative;
      z-index: 1;
    }

    h1 em { font-style: italic; color: var(--teal); }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--warm-gray);
      max-width: 520px;
      font-weight: 300;
      margin-bottom: 0.9rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s ease forwards;
      position: relative;
      z-index: 1;
    }

    .built-by-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      color: white;
      border-radius: 2rem;
      padding: 0.4rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s ease forwards;
      position: relative;
      z-index: 1;
    }

    .built-by-badge span { color: var(--mint); }

    .hero-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.7s 0.8s ease forwards;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: var(--teal);
      color: white;
      padding: 0.9rem 2.2rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(13,115,119,0.3);
    }

    .btn-primary:hover { background: var(--navy); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(13,115,119,0.25); }

    .btn-secondary {
      background: white;
      color: var(--navy);
      padding: 0.9rem 2.2rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1.5px solid var(--light-border);
      transition: border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover { border-color: var(--teal); transform: translateY(-2px); }

    /* BUILT BY STRIP */
    .built-by-strip {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      padding: 3.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .built-by-strip::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 100% at 50% 50%, rgba(13,115,119,0.15) 0%, transparent 70%);
    }

    .built-by-strip .inner {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }

    .strip-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mint);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .built-by-strip h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: white;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .built-by-strip p {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      font-weight: 300;
      max-width: 520px;
      margin: 0 auto;
    }

    .built-by-strip p strong { color: var(--mint); font-weight: 500; }

    /* STATS */
    .stats {
      display: flex;
      justify-content: center;
      background: white;
      border-bottom: 1px solid var(--light-border);
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
      padding: 2.5rem 3.5rem;
      border-right: 1px solid var(--light-border);
      flex: 1;
      min-width: 180px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .stat:last-child { border-right: none; }
    .stat:nth-child(1) { animation-delay: 0.9s; }
    .stat:nth-child(2) { animation-delay: 1.05s; }
    .stat:nth-child(3) { animation-delay: 1.2s; }
    .stat:nth-child(4) { animation-delay: 1.35s; }

    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--navy);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-num.teal { color: var(--teal); }
    .stat-num.coral { color: var(--coral); }
    .stat-num.gold { color: var(--gold); }

    .stat-label {
      font-size: 0.82rem;
      color: var(--warm-gray);
      font-weight: 400;
      margin-top: 0.4rem;
    }

    /* PROBLEM SECTION */
    .problem-section {
      background: var(--off-white);
      padding: 7rem 2rem;
    }

    .problem-inner { max-width: 1100px; margin: 0 auto; }

    .problem-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      margin-top: 3rem;
    }

    .problem-text h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--navy);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .problem-text p {
      color: var(--warm-gray);
      font-weight: 300;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }

    .pain-points { display: flex; flex-direction: column; gap: 0.85rem; }

    .pain-point {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: white;
      border-radius: 0.75rem;
      border: 1px solid var(--light-border);
      transition: box-shadow 0.3s;
    }

    .pain-point:hover { box-shadow: 0 4px 16px rgba(10,22,40,0.07); }

    .pain-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .pain-icon.red { background: rgba(255,107,107,0.12); }
    .pain-icon.orange { background: rgba(244,166,40,0.12); }
    .pain-icon.blue { background: rgba(13,115,119,0.1); }

    .pain-point h4 { font-size: 0.9rem; font-weight: 500; color: var(--navy); margin-bottom: 0.2rem; }
    .pain-point p { font-size: 0.82rem; color: var(--warm-gray); font-weight: 300; line-height: 1.5; margin: 0; }

    .solution-card {
      background: linear-gradient(145deg, var(--navy), var(--navy-mid));
      border-radius: 1.5rem;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .solution-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: var(--teal);
      border-radius: 50%;
      opacity: 0.15;
    }

    .solution-card::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 140px; height: 140px;
      background: var(--mint);
      border-radius: 50%;
      opacity: 0.08;
    }

    .solution-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: white;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .solution-card p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }

    .solution-features { display: flex; flex-direction: column; gap: 1rem; position: relative; z-index: 1; }

    .sol-feat { display: flex; align-items: center; gap: 0.8rem; }

    .sol-feat-dot {
      width: 8px; height: 8px;
      background: var(--mint);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sol-feat span { font-size: 0.88rem; color: rgba(255,255,255,0.75); font-weight: 300; }

    /* HOW IT WORKS */
    .hiw-section { padding: 7rem 2rem; background: white; }
    .hiw-inner { max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--navy);
      letter-spacing: -0.025em;
      line-height: 1.15;
      max-width: 500px;
      margin-bottom: 3.5rem;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    .step {
      padding: 2rem 1.5rem;
      background: var(--off-white);
      border: 1px solid var(--light-border);
      border-radius: 1.2rem;
      transition: box-shadow 0.3s, transform 0.3s;
      text-align: center;
    }

    .step:hover { box-shadow: 0 8px 32px rgba(10,22,40,0.08); transform: translateY(-3px); }

    .step-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin: 0 auto 1.2rem;
    }

    .step-icon.s1 { background: rgba(13,115,119,0.1); }
    .step-icon.s2 { background: rgba(244,166,40,0.12); }
    .step-icon.s3 { background: rgba(255,107,107,0.1); }
    .step-icon.s4 { background: rgba(20,199,184,0.1); }

    .step h3 { font-size: 0.95rem; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; }
    .step p { font-size: 0.85rem; color: var(--warm-gray); font-weight: 300; line-height: 1.6; }

    /* AUDIENCE */
    .audience-section { padding: 7rem 2rem; background: var(--off-white); }
    .audience-inner { max-width: 1100px; margin: 0 auto; }

    .audience {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 3.5rem;
    }

    .audience-card {
      padding: 2.8rem;
      border-radius: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    .audience-card.students { background: linear-gradient(145deg, var(--navy), var(--navy-mid)); }
    .audience-card.partners { background: white; border: 1px solid var(--light-border); }

    .card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      margin-bottom: 1.2rem;
    }

    .students .card-tag { background: rgba(20,199,184,0.15); color: var(--mint); }
    .partners .card-tag { background: rgba(13,115,119,0.08); color: var(--teal); }

    .audience-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .students h3 { color: white; }
    .partners h3 { color: var(--navy); }

    .audience-card .card-sub { font-size: 0.88rem; font-weight: 300; margin-bottom: 1.8rem; }
    .students .card-sub { color: rgba(255,255,255,0.45); }
    .partners .card-sub { color: var(--warm-gray); }

    .audience-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }

    .audience-list li {
      font-size: 0.9rem;
      font-weight: 300;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .students .audience-list li { color: rgba(255,255,255,0.7); }
    .partners .audience-list li { color: var(--warm-gray); }

    .check {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .students .check { background: rgba(20,199,184,0.2); color: var(--mint); }
    .partners .check { background: rgba(13,115,119,0.1); color: var(--teal); }

    /* FOUNDER SECTION */
    .founder-section {
      background: white;
      padding: 7rem 2rem;
      border-top: 1px solid var(--light-border);
      border-bottom: 1px solid var(--light-border);
    }

    .founder-inner { max-width: 800px; margin: 0 auto; text-align: center; }

    .quote-mark {
      font-family: 'DM Serif Display', serif;
      font-size: 6rem;
      color: var(--mint);
      line-height: 0.6;
      margin-bottom: 1.5rem;
      opacity: 0.4;
    }

    .founder-quote {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1.4;
      font-style: italic;
      margin-bottom: 2rem;
    }

    .founder-info { display: flex; align-items: center; justify-content: center; gap: 1rem; }

    .founder-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--mint));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: white;
    }

    .founder-details { text-align: left; }
    .founder-name { font-weight: 500; font-size: 0.9rem; color: var(--navy); }
    .founder-title { font-size: 0.8rem; color: var(--warm-gray); font-weight: 300; }

    /* SIGN UP */
    .signup-section {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 60%, #0d3352 100%);
      padding: 7rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .signup-section::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 500px; height: 500px;
      background: var(--teal);
      border-radius: 50%;
      opacity: 0.07;
    }

    .signup-section::after {
      content: '';
      position: absolute;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: var(--mint);
      border-radius: 50%;
      opacity: 0.05;
    }

    .signup-inner {
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .signup-inner .section-label { color: var(--mint); }
    .signup-inner .section-title { color: white; max-width: 100%; margin-bottom: 0.75rem; }

    .signup-sub { color: rgba(255,255,255,0.45); font-size: 0.95rem; font-weight: 300; margin-bottom: 2.5rem; }

    .form-tabs {
      display: flex;
      background: rgba(255,255,255,0.07);
      border-radius: 2rem;
      padding: 0.25rem;
      margin-bottom: 2.5rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .tab-btn {
      padding: 0.6rem 1.6rem;
      border-radius: 2rem;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active { background: white; color: var(--navy); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-group { margin-bottom: 1.1rem; text-align: left; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      margin-bottom: 0.45rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.65rem;
      padding: 0.85rem 1rem;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
